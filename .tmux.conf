# Rebind Prefix to C-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind v copy-mode

set-window-option -g mode-keys vi
set -g mouse on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

set-option -sg escape-time 10
set-option -g focus-events on

# True color + italics; tmux-256color is the modern default
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

bind -n M-h previous-window
bind -n M-l next-window

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# ─── One Dark transparent status bar ──────────────────────────────────────
# Palette
%hidden ODFG="#abb2bf"
%hidden ODMUTED="#5c6370"
%hidden ODBLUE="#61afef"
%hidden ODGREEN="#98c379"
%hidden ODYELLOW="#e5c07b"
%hidden ODPURPLE="#c678dd"
%hidden ODRED="#e06c75"

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5

# Transparent status — let the terminal blur show through
set -g status-style "bg=default,fg=$ODFG"
set -g status-left-length 40
set -g status-right-length 100

# Window-list separator + alignment
set -g window-status-separator " "

# Left: session name
set -g status-left "#[fg=$ODPURPLE,bold] #S #[fg=$ODMUTED]│ "

# Windows
set -g window-status-format "#[fg=$ODMUTED] #I #[fg=$ODFG]#W "
set -g window-status-current-format "#[fg=$ODBLUE,bold] #I #[fg=$ODFG,bold]#W "
set -g window-status-current-style "bg=default"
set -g window-status-style "bg=default"
set -g window-status-activity-style "fg=$ODYELLOW,bg=default"

# Right: date / time
set -g status-right "#[fg=$ODMUTED]%Y-%m-%d #[fg=$ODFG]%H:%M "

# Pane borders — subtle, blend with blur
set -g pane-border-style "fg=$ODMUTED"
set -g pane-active-border-style "fg=$ODBLUE"

# Messages / command prompt
set -g message-style "bg=default,fg=$ODYELLOW"
set -g message-command-style "bg=default,fg=$ODBLUE"

# Mode (copy-mode etc.)
set -g mode-style "bg=$ODBLUE,fg=#282c34"

run '~/.tmux/plugins/tpm/tpm'
